<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AlphaFlow AI Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  :root { --buy:#16a34a; --sell:#dc2626; --hold:#d97706; --watch:#2563eb; --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --muted:#94a3b8; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--text); }
  header { padding: 24px 32px; border-bottom: 1px solid #334155; }
  header h1 { margin:0; font-size: 22px; }
  header p { margin:4px 0 0; color: var(--muted); font-size: 14px; }
  .search { display:flex; gap:8px; padding: 24px 32px; }
  input { flex:1; max-width:320px; padding:10px 14px; border-radius:8px; border:1px solid #334155; background:#0b1220; color:var(--text); font-size:14px; }
  button { padding:10px 20px; border-radius:8px; border:none; background:#3b82f6; color:white; font-weight:600; cursor:pointer; }
  button:hover { background:#2563eb; }
  .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap:16px; padding: 0 32px 32px; }
  .card { background: var(--card); border-radius:12px; padding:20px; border: 1px solid #334155; }
  .card h3 { margin:0 0 12px; font-size:13px; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); }
  .metric { font-size:28px; font-weight:700; }
  .decision-badge { display:inline-block; padding:6px 16px; border-radius:999px; font-weight:700; font-size:18px; }
  .decision-BUY { background: var(--buy); }
  .decision-SELL { background: var(--sell); }
  .decision-HOLD { background: var(--hold); }
  .decision-WATCHLIST { background: var(--watch); }
  .reasons { list-style:none; padding:0; margin:0; }
  .reasons li { padding: 6px 0; border-bottom: 1px dashed #334155; font-size: 14px; color: var(--muted); }
  .explanation { white-space: pre-line; font-size: 14px; line-height:1.6; color: var(--text); }
  .warn { color: #f59e0b; font-size: 13px; }
  #error { color: var(--sell); padding: 0 32px; }
  .loading { padding: 0 32px; color: var(--muted); }
</style>
</head>
<body>
  <header>
    <h1>AlphaFlow AI</h1>
    <p>Multi-agent stock market analysis & recommendation dashboard</p>
  </header>

  <div class="search">
    <input id="ticker" placeholder="Enter ticker e.g. AAPL, SBIN.NS, RELIANCE.NS" value="AAPL" />
    <button onclick="analyze()">Analyze</button>
  </div>

  <div id="loading" class="loading" style="display:none;">Running multi-agent analysis…</div>
  <div id="error"></div>
  <div id="results" class="grid"></div>

  <script>
    // Point this at your deployed backend URL in production.
    const API_BASE = "https://alphaflow-ai.onrender.com/api/v1";

    async function analyze() {
      const ticker = document.getElementById("ticker").value.trim();
      const results = document.getElementById("results");
      const errorEl = document.getElementById("error");
      const loading = document.getElementById("loading");
      results.innerHTML = ""; errorEl.textContent = ""; loading.style.display = "block";

      try {
        const res = await fetch(`${API_BASE}/analyze/${encodeURIComponent(ticker)}`);
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.detail || `Request failed (${res.status})`);
        }
        const data = await res.json();
        render(data);
      } catch (err) {
        errorEl.textContent = `Error: ${err.message}`;
      } finally {
        loading.style.display = "none";
      }
    }

    function render(data) {
      const results = document.getElementById("results");
      const { ticker, scores, prediction, risk, recommendation, warnings } = data;

      results.innerHTML = `
        <div class="card">
          <h3>Recommendation — ${ticker}</h3>
          <span class="decision-badge decision-${recommendation.decision}">${recommendation.decision}</span>
        </div>
        <div class="card">
          <h3>Prediction</h3>
          <div class="metric">${prediction.expected_return_pct > 0 ? "+" : ""}${prediction.expected_return_pct}%</div>
          <p style="color:var(--muted)">Expected Return</p>
          <p>Profit Probability: <b>${prediction.profit_probability}%</b></p>
          <p>Confidence: <b>${prediction.confidence_score}%</b></p>
          <p>Direction: <b>${prediction.price_direction}</b></p>
        </div>
        <div class="card">
          <h3>Risk</h3>
          <div class="metric">${risk.risk_label}</div>
          <p>Overall Score: ${risk.overall_risk_score}/100</p>
          <p>Volatility: ${risk.volatility_score} · Liquidity: ${risk.liquidity_score}</p>
          <p>Drawdown: ${risk.drawdown_score} · Event: ${risk.event_risk_score}</p>
        </div>
        <div class="card">
          <h3>Scores</h3>
          <p>Technical: ${scores.technical_score}</p>
          <p>Fundamental: ${scores.fundamental_score}</p>
          <p>Sentiment: ${scores.sentiment_score}</p>
          <p>Momentum: ${scores.momentum_score}</p>
        </div>
        <div class="card" style="grid-column: 1 / -1;">
          <h3>Why?</h3>
          <ul class="reasons">${recommendation.reasons.map(r => `<li>${r}</li>`).join("")}</ul>
          <p class="explanation">${recommendation.explanation}</p>
          ${warnings.length ? `<p class="warn">⚠ ${warnings.join(" · ")}</p>` : ""}
        </div>
      `;
    }

    document.getElementById("ticker").addEventListener("keydown", e => {
      if (e.key === "Enter") analyze();
    });
  </script>
</body>
</html>
